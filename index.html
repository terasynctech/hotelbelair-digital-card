<style>

/* BACKGROUND */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a0a0a, #1c1c1c);
    color: white;
    text-align: center;
}

/* CARD */
.card {
    max-width: 400px;
    margin: 40px auto;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);

}

/* LOGO */
.logo {
    width: 140px;
    margin-bottom: 10px;
}

/* NAME */
h1 {
    margin: 10px 0;
    font-size: 24px;
    color: #ffd700;
}

/* TEXT */
p {
    margin: 5px 0;
    color: #ccc;
    font-size: 14px;
}

/* TAGLINE */
.tagline {
    margin: 10px 0;
    font-size: 14px;
    color: #aaa;
}

/* BUTTON */
.btn {
    display: block;
    margin: 12px auto;
    padding: 12px;
    width: 90%;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    color: black;
    background: linear-gradient(90deg, #d4af37, #ffd700);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* QR */
.qr {
    width: 140px;
    margin-top: 15px;
}

/* FOOTER */
.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #aaa;
}
